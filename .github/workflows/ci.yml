name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: API · typecheck, build, test, audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: bsn_lacak_test
          POSTGRES_USER: bsn
          POSTGRES_PASSWORD: bsn
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bsn"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://bsn:bsn@localhost:5432/bsn_lacak_test?schema=public
      JWT_SECRET: ci-test-secret-min-16-chars-abcdef
      JWT_EXPIRES_IN: 15m
      WEB_ORIGIN: http://localhost:5173
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: api/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npx prisma generate
      - run: npx tsc --noEmit
      - run: npx prisma migrate deploy
      - run: npm test
      - run: npm run build
      - run: npm audit --omit=dev --audit-level=high

  web:
    name: Web · typecheck, lint, test, build, audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npx tsc --noEmit
      - run: npm run lint
      - run: npm test
      - run: npx vite build
        env:
          VITE_USE_MOCK: 'true'
      - run: npm audit --omit=dev --audit-level=high

  e2e:
    name: Web · Playwright E2E
    runs-on: ubuntu-latest
    needs: [web]
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
        env:
          VITE_USE_MOCK: 'true'
      - if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: web/playwright-report
          retention-days: 7

  docker:
    name: Docker · build images
    runs-on: ubuntu-latest
    needs: [api, web]
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - name: Build API image
        uses: docker/build-push-action@v7
        with:
          context: ./api
          push: false
          load: false
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max
      - name: Build Web image
        uses: docker/build-push-action@v7
        with:
          context: ./web
          push: false
          load: false
          build-args: |
            VITE_USE_MOCK=true
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max
