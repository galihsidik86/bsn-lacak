version: 2
updates:
  # ---- API npm packages ----
  - package-ecosystem: npm
    directory: /api
    schedule:
      interval: weekly
    groups:
      api-deps:
        patterns: ['*']
    open-pull-requests-limit: 5
    ignore:
      # Express 5 is a substantial migration (async handlers, router rewrite).
      # Handle as a planned project, not an auto-bump.
      - dependency-name: 'express'
        update-types: ['version-update:semver-major']
      # Prisma 7 requires a prisma.config.ts migration.
      - dependency-name: '@prisma/client'
        update-types: ['version-update:semver-major']
      - dependency-name: 'prisma'
        update-types: ['version-update:semver-major']
      # Zod 4 must move in lock-step with zod-to-openapi 8.
      - dependency-name: 'zod'
        update-types: ['version-update:semver-major']
      - dependency-name: '@asteasolutions/zod-to-openapi'
        update-types: ['version-update:semver-major']
      # bcryptjs 3 changes hash format; needs a migration path for existing users.
      - dependency-name: 'bcryptjs'
        update-types: ['version-update:semver-major']
      - dependency-name: '@types/bcryptjs'
        update-types: ['version-update:semver-major']
      # Other ecosystem-tied bumps that need manual review.
      - dependency-name: 'pino-http'
        update-types: ['version-update:semver-major']
      - dependency-name: 'express-rate-limit'
        update-types: ['version-update:semver-major']
      - dependency-name: 'typescript'
        update-types: ['version-update:semver-major']
      # @types/node tracks Node runtime — coordinate via the Docker base image bump.
      - dependency-name: '@types/node'
        update-types: ['version-update:semver-major']

  # ---- Web npm packages ----
  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
    groups:
      web-deps:
        patterns: ['*']
    open-pull-requests-limit: 5
    ignore:
      # React 19 → Suspense + automatic batching changes; needs full E2E pass.
      - dependency-name: 'react'
        update-types: ['version-update:semver-major']
      - dependency-name: 'react-dom'
        update-types: ['version-update:semver-major']
      - dependency-name: '@types/react'
        update-types: ['version-update:semver-major']
      - dependency-name: '@types/react-dom'
        update-types: ['version-update:semver-major']
      # Vite/plugin/PWA — large rewrites between majors.
      - dependency-name: 'vite'
        update-types: ['version-update:semver-major']
      - dependency-name: '@vitejs/plugin-react'
        update-types: ['version-update:semver-major']
      - dependency-name: 'vite-plugin-pwa'
        update-types: ['version-update:semver-major']
      # Tooling — bump as a coordinated effort, not piecemeal.
      - dependency-name: 'typescript'
        update-types: ['version-update:semver-major']
      - dependency-name: 'eslint'
        update-types: ['version-update:semver-major']
      - dependency-name: '@typescript-eslint/eslint-plugin'
        update-types: ['version-update:semver-major']
      - dependency-name: '@typescript-eslint/parser'
        update-types: ['version-update:semver-major']
      # State/data libs that touch most screens on major bumps.
      - dependency-name: '@tanstack/react-query'
        update-types: ['version-update:semver-major']
      - dependency-name: 'zustand'
        update-types: ['version-update:semver-major']
      - dependency-name: 'react-router-dom'
        update-types: ['version-update:semver-major']

  # ---- Docker base images ----
  - package-ecosystem: docker
    directory: /api
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directory: /web
    schedule:
      interval: weekly

  # ---- GitHub Actions ----
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
