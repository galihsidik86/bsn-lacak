<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Legacy launcher icon — devices Android < 8 (mipmap PNG dipakai
       langsung tanpa adaptive masking). Logo lebih besar (radius 340)
       karena tidak ada safe zone constraint, dan background gradient
       langsung di SVG. -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2aa56e"/>
      <stop offset="100%" stop-color="#1a7a4f"/>
    </linearGradient>
    <radialGradient id="starGrad" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e8f5ee"/>
    </radialGradient>
    <radialGradient id="goldGrad" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#fcd96f"/>
      <stop offset="55%" stop-color="#e9b949"/>
      <stop offset="100%" stop-color="#b88a26"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="8"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Rounded square background (Android < 7 default mask is square,
       Android 7+ launchers sering pakai squircle. Radius 180 cocok untuk
       keduanya). -->
  <rect width="1024" height="1024" rx="180" fill="url(#bgGrad)"/>

  <!-- Subtle islamic pattern overlay di background — opacity rendah
       supaya tidak ramai. -->
  <g opacity="0.06" stroke="#fff" stroke-width="2" fill="none">
    <circle cx="160" cy="160" r="60"/>
    <circle cx="864" cy="160" r="60"/>
    <circle cx="160" cy="864" r="60"/>
    <circle cx="864" cy="864" r="60"/>
  </g>

  <!-- 8-point star -->
  <g transform="translate(512 512)" filter="url(#shadow)">
    <rect x="-320" y="-320" width="640" height="640" rx="48"
          fill="url(#starGrad)"/>
    <rect x="-320" y="-320" width="640" height="640" rx="48"
          fill="url(#starGrad)" transform="rotate(45)"/>
  </g>

  <g transform="translate(512 512)" stroke="#1f8a5b" stroke-width="3.6"
     fill="none" stroke-linecap="round" opacity="0.32">
    <line x1="-170" y1="0" x2="170" y2="0"/>
    <line x1="0" y1="-170" x2="0" y2="170"/>
    <line x1="-120" y1="-120" x2="120" y2="120"/>
    <line x1="-120" y1="120" x2="120" y2="-120"/>
    <circle cx="0" cy="0" r="158" stroke-opacity="0.5"/>
  </g>

  <g transform="translate(512 512)">
    <circle cx="0" cy="0" r="104" fill="url(#goldGrad)"
            stroke="#7d5a18" stroke-width="3.5" stroke-opacity="0.55"/>
    <circle cx="0" cy="0" r="84" fill="none"
            stroke="#fff" stroke-width="3" stroke-opacity="0.55"/>
    <circle cx="0" cy="0" r="20" fill="#7d5a18"/>
  </g>
</svg>
