<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Adaptive icon foreground: rendered di canvas 1024x1024, tapi
       safe zone Android cuma 66% tengah (≈ inner 676px). Logo
       didesain dalam radius ~280 dari center supaya tidak ke-crop
       saat OS apply mask bulat / squircle. Background drawn via XML. -->
  <defs>
    <!-- Soft inner glow di tepi 8-point star supaya tidak flat. -->
    <radialGradient id="starGrad" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="65%" stop-color="#ffffff" stop-opacity="0.96"/>
      <stop offset="100%" stop-color="#e8f5ee" stop-opacity="0.88"/>
    </radialGradient>
    <!-- Gold core dengan gradient supaya ada depth, bukan flat disk. -->
    <radialGradient id="goldGrad" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#fcd96f"/>
      <stop offset="55%" stop-color="#e9b949"/>
      <stop offset="100%" stop-color="#b88a26"/>
    </radialGradient>
    <!-- Halus drop shadow di belakang star supaya pop dari background. -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.28"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 8-point star (rub el hizb) — 2 kotak yang overlapping, ikon
       Islamic universal. Stroke dipakai supaya bentuk tetap legible
       di ukuran kecil (mdpi 48px). Center 512,512; radius ~290. -->
  <g transform="translate(512 512)" filter="url(#shadow)">
    <rect x="-280" y="-280" width="560" height="560" rx="42"
          fill="url(#starGrad)" stroke="#0e6a44" stroke-width="6"
          stroke-opacity="0.18"/>
    <rect x="-280" y="-280" width="560" height="560" rx="42"
          fill="url(#starGrad)" stroke="#0e6a44" stroke-width="6"
          stroke-opacity="0.18" transform="rotate(45)"/>
  </g>

  <!-- Inner pattern: garis tipis di dalam star membentuk pola
       geometris (rub el hizb fill). Subtle, tidak distract logo. -->
  <g transform="translate(512 512)" stroke="#1f8a5b" stroke-width="3.2"
     fill="none" stroke-linecap="round" opacity="0.32">
    <line x1="-150" y1="0" x2="150" y2="0"/>
    <line x1="0" y1="-150" x2="0" y2="150"/>
    <line x1="-106" y1="-106" x2="106" y2="106"/>
    <line x1="-106" y1="106" x2="106" y2="-106"/>
    <circle cx="0" cy="0" r="140" stroke-opacity="0.5"/>
  </g>

  <!-- Center: gold disk dengan ring outline + tiny inner dot.
       Brand BSN Syariah accent. -->
  <g transform="translate(512 512)">
    <circle cx="0" cy="0" r="92" fill="url(#goldGrad)"
            stroke="#7d5a18" stroke-width="3" stroke-opacity="0.55"/>
    <circle cx="0" cy="0" r="74" fill="none"
            stroke="#fff" stroke-width="2.5" stroke-opacity="0.55"/>
    <circle cx="0" cy="0" r="18" fill="#7d5a18"/>
  </g>
</svg>
