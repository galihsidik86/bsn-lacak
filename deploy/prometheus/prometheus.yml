# Sample Prometheus config. Drop this into your monitoring stack and point it
# at the BSN Lacak API host. The /metrics endpoint is restricted to internal
# subnets by nginx (see deploy/nginx/nginx.conf) — scrape from an IP that's
# in the allow list, or scrape api:4000 directly inside the compose network.

global:
  scrape_interval: 15s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: bsn-api
    metrics_path: /metrics
    static_configs:
      - targets: ['api:4000']
        labels:
          env: production
          app: bsn-lacak
