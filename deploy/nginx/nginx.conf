user nginx;
worker_processes auto;
worker_rlimit_nofile 8192;

events {
  worker_connections 4096;
  use epoll;
  multi_accept on;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  log_format json escape=json '{'
    '"time":"$time_iso8601",'
    '"remote_addr":"$remote_addr",'
    '"request":"$request",'
    '"status":$status,'
    '"bytes":$body_bytes_sent,'
    '"referer":"$http_referer",'
    '"ua":"$http_user_agent",'
    '"rt":$request_time,'
    '"upstream":"$upstream_addr",'
    '"rid":"$http_x_request_id"'
  '}';
  access_log /var/log/nginx/access.log json;
  error_log  /var/log/nginx/error.log warn;

  # ---- Tuning ----
  server_tokens off;
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  types_hash_max_size 2048;
  client_max_body_size 12m;          # leaves headroom over the API's 8m photo limit
  client_body_timeout 30s;
  client_header_timeout 15s;
  send_timeout 30s;
  reset_timedout_connection on;

  # ---- Compression ----
  gzip on;
  gzip_comp_level 5;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_vary on;
  gzip_types text/plain text/css application/javascript application/json
             application/xml image/svg+xml application/manifest+json;

  # ---- Rate limit zones (per-IP) ----
  # 20 r/s burst 40 for the SPA, 10 r/s burst 20 for the API.
  limit_req_zone $binary_remote_addr zone=web_zone:10m rate=20r/s;
  limit_req_zone $binary_remote_addr zone=api_zone:10m rate=10r/s;
  # Stricter for /api/auth/login
  limit_req_zone $binary_remote_addr zone=login_zone:10m rate=1r/s;

  # ---- Upstreams ----
  upstream bsn_api { server api:4000; keepalive 32; }
  upstream bsn_web { server web:80;  keepalive 32; }

  # ---- HTTP → HTTPS ----
  server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
  }

  # ---- HTTPS terminator ----
  server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # ---- Security headers ----
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(self), geolocation=(self), microphone=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;

    # Forward request ID to upstream + accept upstream-set one.
    set $rid $http_x_request_id;
    if ($rid = '') { set $rid $request_id; }

    # ---- /metrics + /api/docs: only allow internal subnets ----
    # Adjust the allow list to match your monitoring / dev source IPs.
    location = /metrics {
      allow 10.0.0.0/8;
      allow 172.16.0.0/12;
      allow 192.168.0.0/16;
      deny  all;
      proxy_pass http://bsn_api/metrics;
      proxy_set_header Host $host;
    }

    location /api/docs {
      allow 10.0.0.0/8;
      allow 172.16.0.0/12;
      allow 192.168.0.0/16;
      deny  all;
      proxy_pass http://bsn_api;
      proxy_set_header Host $host;
    }
    location = /api/openapi.json {
      allow 10.0.0.0/8;
      allow 172.16.0.0/12;
      allow 192.168.0.0/16;
      deny  all;
      proxy_pass http://bsn_api;
      proxy_set_header Host $host;
    }

    # ---- API ----
    location /api/auth/login {
      limit_req zone=login_zone burst=5 nodelay;
      proxy_pass http://bsn_api;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-Id $rid;
      proxy_connect_timeout 5s;
      proxy_read_timeout 30s;
    }

    location /api/ {
      limit_req zone=api_zone burst=40 nodelay;
      proxy_pass http://bsn_api;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-Id $rid;
      proxy_connect_timeout 5s;
      proxy_read_timeout 60s;
    }

    location /uploads/ {
      proxy_pass http://bsn_api;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      expires 7d;
      add_header Cache-Control "public" always;
    }

    # ---- Web (SPA) ----
    location / {
      limit_req zone=web_zone burst=60 nodelay;
      proxy_pass http://bsn_web;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
